<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debug - Mobile UI Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .phone-frame {
            width: 375px;
            height: 667px;
            background: #0a0a0a;
            border: 4px solid #333;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 2px #222, 0 0 0 6px #111;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Notch */
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #333;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        /* Debug Info */
        .debug-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #00ff00;
            font-size: 10px;
            font-family: monospace;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* News Button - Original Styles */
        .news-button {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            background: #111;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
        }

        .news-button:hover {
            transform: scale(1.1);
            border-color: white;
            box-shadow: 0 0 30px rgba(255,255,255,0.7);
        }

        /* News Modal */
        .news-modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            padding: 20px;
        }

        .news-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .news-modal-content {
            background: #0a0a0a;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(255,255,255,0.5);
            transform: scale(0.9);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            color: white;
        }

        .news-modal-overlay.active .news-modal-content {
            transform: scale(1);
        }

        .news-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .news-modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            margin: 0;
        }

        .news-modal-close {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .news-modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            transform: rotate(90deg);
            box-shadow: 0 0 25px white;
        }

        .news-container {
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 10px;
            max-height: 60vh;
        }

        .news-entry {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .news-entry:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .news-entry-title {
            font-size: 1.4rem;
            color: white;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .news-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .news-meta span i {
            margin-right: 5px;
        }

        .news-content {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .news-content p {
            margin-bottom: 8px;
        }

        .news-bold {
            font-weight: 900;
            font-size: 1.1em;
            color: white;
            text-shadow: 0 0 8px rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        .news-link {
            color: white;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .news-link:hover {
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.7);
            border-bottom-color: white;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .toggle-news-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: fit-content;
            align-self: center;
        }

        .toggle-news-btn:hover {
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .news-loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.7);
        }

        .news-loading i {
            margin-right: 10px;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .news-error {
            text-align: center;
            padding: 40px;
            color: rgba(255,100,100,0.9);
        }

        /* Mobile Styles (375px) */
        @media (max-width: 375px) {
            .news-button {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }
            .news-modal-content {
                padding: 20px;
            }
            .news-modal-title {
                font-size: 1.5rem;
            }
            .news-entry-title {
                font-size: 1.2rem;
            }
            .news-meta {
                flex-direction: column;
                gap: 5px;
            }
            .news-content a {
                word-break: break-all;
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen" id="phoneScreen">
            
            <!-- NEWS BUTTON -->
            <div class="news-button" id="newsButton">
                <i class="fas fa-newspaper"></i>
            </div>

            <!-- NEWS MODAL -->
            <div class="news-modal-overlay" id="newsModal">
                <div class="news-modal-content">
                    <div class="news-modal-header">
                        <h2 class="news-modal-title">RECENT NEWS</h2>
                        <button class="news-modal-close" id="closeNewsModal"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="news-container" id="newsContainer">
                        <div class="news-loading"><i class="fas fa-spinner"></i> Loading...</div>
                    </div>
                    <button class="toggle-news-btn" id="toggleNewsBtn" style="display: none;">SHOW MORE</button>
                </div>
            </div>

            <!-- DEBUG INFO -->
            <div class="debug-info">
                📱 375px | Buttons: ✅
            </div>
        </div>
    </div>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts for Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script>
        (function() {
            const newsButton = document.getElementById('newsButton');
            const newsModal = document.getElementById('newsModal');
            const closeNewsModal = document.getElementById('closeNewsModal');
            const newsContainer = document.getElementById('newsContainer');
            const toggleBtn = document.getElementById('toggleNewsBtn');
            const phoneScreen = document.getElementById('phoneScreen');
            
            let allNews = [];
            let showingAll = false;

            // DEMO NEWS DATA (für Test)
            const demoNews = [
                {
                    id: 4,
                    title: "JOIN OUR DISCORD",
                    date: "03.17.2026",
                    author: "Nexoo",
                    paste: "Join our Discord community to get the latest updates, support, and tools:\n\n🔗 https://discord.gg/DbNQgMWJ8G\n\n👉 Get help with tools\n👉 Report bugs\n👉 Early access to new features\n👉 Community discussions"
                },
                {
                    id: 3,
                    title: "WHASH Update",
                    date: "03.10.2026",
                    author: "DevTeam",
                    paste: "WHASH now supports 5 new hash algorithms.\n\nPerformance increased by 20%.\n\nNew features:\n- MD5 support\n- SHA256 support\n- Custom wordlists"
                },
                {
                    id: 2,
                    title: "Site Maintenance",
                    date: "03.15.2026",
                    author: "Nexoo",
                    paste: "The website will be under maintenance for 2 hours.\n\nSearch function might be temporarily unavailable.\n\nWe apologize for the inconvenience."
                },
                {
                    id: 1,
                    title: "New Domain!",
                    date: "03.17.2026",
                    author: "Nexoo",
                    paste: "We have officially moved to our new domain: https://whiteboxgroup.github.io\n\nUpdate your bookmarks!\n\nMore features coming soon."
                }
            ];

            function loadNews() {
                newsContainer.innerHTML = '<div class="news-loading"><i class="fas fa-spinner"></i> Loading...</div>';
                
                // Simulate loading delay
                setTimeout(() => {
                    allNews = demoNews.sort((a, b) => b.id - a.id);
                    renderNews();
                }, 500);
            }

            function renderNews() {
                if (allNews.length === 0) {
                    newsContainer.innerHTML = '<div class="news-error">No news available</div>';
                    toggleBtn.style.display = 'none';
                    return;
                }

                const displayNews = showingAll ? allNews : allNews.slice(0, 1);
                let html = '';

                displayNews.forEach(item => {
                    const withBold = item.paste.replace(/\*\*(.*?)\*\*/g, '<span class="news-bold">$1</span>');
                    const withLinks = withBold.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" class="news-link">$1</a>');
                    const contentHtml = withLinks.split('\n').map(line => {
                        if (line.trim() === '') return '<br>';
                        return `<p>${line}</p>`;
                    }).join('');

                    html += `
                        <div class="news-entry">
                            <div class="news-entry-title">${item.title}</div>
                            <div class="news-meta">
                                <span><i class="far fa-calendar-alt"></i> ${item.date}</span>
                                <span><i class="far fa-user"></i> ${item.author}</span>
                            </div>
                            <div class="news-content">${contentHtml}</div>
                        </div>
                    `;
                });

                newsContainer.innerHTML = html;

                if (allNews.length > 1) {
                    toggleBtn.style.display = 'block';
                    toggleBtn.textContent = showingAll ? 'SHOW LESS' : 'SHOW MORE (' + (allNews.length - 1) + ' more)';
                } else {
                    toggleBtn.style.display = 'none';
                }
            }

            newsButton.addEventListener('click', () => {
                newsModal.classList.add('active');
                loadNews();
            });

            function closeModal() {
                newsModal.classList.remove('active');
            }

            closeNewsModal.addEventListener('click', closeModal);
            newsModal.addEventListener('click', (e) => {
                if (e.target === newsModal) closeModal();
            });

            toggleBtn.addEventListener('click', () => {
                showingAll = !showingAll;
                renderNews();
            });

            // Prevent horizontal scroll in modal
            document.querySelector('.news-modal-content')?.addEventListener('wheel', (e) => {
                if (e.deltaX !== 0) e.preventDefault();
            }, { passive: false });

        })();
    </script>
</body>
</html>
