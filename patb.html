<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Box | Has everything you need</title>
    <link rel="icon" type="image/png" href="wh.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Roboto+Mono:wght@300;400;500;700&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hot-pink: #ff1a8c;
            --dark-pink: #cc0066;
            --light-pink: #ff99cc;
            --pink-glow: rgba(255, 26, 140, 0.8);
            --pink-bg: #1a0012;
            --pink-card: #330026;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', cursive;
            background-color: var(--pink-bg);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff1a8c, #99004d);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-content {
            text-align: center;
            animation: float 3s infinite ease-in-out;
        }

        .loading-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px white);
            animation: spin 2s infinite linear;
        }

        .loading-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px white, 0 0 40px white;
            letter-spacing: 5px;
        }

        .loading-dots {
            display: inline-block;
            width: 60px;
            text-align: left;
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        .black-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 100000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            pointer-events: none;
        }

        .black-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(255, 26, 140, 0.3);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 2px solid var(--hot-pink);
            box-shadow: 0 0 30px var(--hot-pink);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            text-decoration: none;
            text-shadow: 0 0 15px white;
        }

        .logo i {
            margin-right: 10px;
            color: white;
            filter: drop-shadow(0 0 10px white);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 10px white;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .nav-links a:hover {
            background: white;
            color: var(--hot-pink);
            box-shadow: 0 0 30px white;
            transform: scale(1.1);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            text-shadow: 0 0 15px white;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 5rem;
            margin-bottom: 20px;
            color: white;
            text-shadow: 0 0 30px white, 0 0 60px white;
            animation: glow 2s infinite alternate;
            font-family: 'Comic Neue', cursive;
        }

        .hero p {
            font-size: 1.5rem;
            max-width: 600px;
            margin-bottom: 40px;
            color: white;
            text-shadow: 0 0 15px white;
        }

        .beach-emoji {
            font-size: 4rem;
            margin: 20px;
            animation: bounce 1s infinite;
        }

        .floating-gifs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }

        .floating-gifs.active {
            opacity: 1;
            visibility: visible;
        }

        .gif-item {
            position: absolute;
            width: 100px;
            height: 100px;
            object-fit: contain;
            pointer-events: none;
            animation: float-around 15s infinite linear;
            filter: drop-shadow(0 0 20px white);
        }

        @keyframes float-around {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, 50px) rotate(90deg); }
            50% { transform: translate(50px, 150px) rotate(180deg); }
            75% { transform: translate(-50px, 50px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .party-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 26, 140, 0.3);
            backdrop-filter: blur(15px);
            z-index: 99998;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .party-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .party-modal-content {
            background: linear-gradient(135deg, #ff4da6, #b3005c);
            border: 4px solid white;
            border-radius: 50px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 50px white, 0 0 100px white;
            transform: scale(0.8);
            transition: all 0.5s ease;
        }

        .party-modal-overlay.active .party-modal-content {
            transform: scale(1);
        }

        .party-modal-content h2 {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 20px white;
            font-family: 'Comic Neue', cursive;
        }

        .party-modal-content p {
            font-size: 1.3rem;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px white;
        }

        .party-btn {
            background: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--hot-pink);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Comic Neue', cursive;
            box-shadow: 0 0 30px white;
            transition: all 0.3s ease;
            border: 2px solid white;
            -webkit-tap-highlight-color: transparent;
        }

        .party-btn:hover {
            transform: scale(1.1);
            background: var(--hot-pink);
            color: white;
            box-shadow: 0 0 50px white;
        }

        .party-btn:active {
            transform: scale(0.95);
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 0 0 10px white;
            z-index: 1;
            font-size: 0.9rem;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 30px white, 0 0 60px white; }
            to { text-shadow: 0 0 50px white, 0 0 90px white; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes dots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        @media (max-width: 768px) {
            .hero h1 { 
                font-size: 3rem; 
            }
            .hero p { 
                font-size: 1.2rem; 
                padding: 0 20px;
            }
            .nav-links { 
                display: none; 
            }
            .mobile-menu-btn { 
                display: block; 
            }
            .gif-item { 
                width: 70px; 
                height: 70px; 
            }
            .party-modal-content {
                padding: 25px;
            }
            .party-modal-content h2 {
                font-size: 2rem;
            }
            .party-modal-content p {
                font-size: 1.1rem;
            }
            .party-btn {
                padding: 12px 30px;
                font-size: 1.5rem;
            }
            .loading-text {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .hero h1 { 
                font-size: 2.2rem; 
            }
            .gif-item { 
                width: 50px; 
                height: 50px; 
            }
            .beach-emoji {
                font-size: 3rem;
            }
            .footer {
                font-size: 0.8rem;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="black-screen" id="blackScreen"></div>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-emoji">🌸🏖️🌸</div>
            <div class="loading-text">PARTY BOX<span class="loading-dots"></span></div>
        </div>
    </div>

    <nav class="navbar">
        <a href="/" class="logo">
            <i class="fas fa-umbrella-beach"></i>
            <span>PARTY BOX</span>
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/#tools">Tools</a>
            <a href="/#about">About</a>
            <a href="https://discord.gg/DbNQgMWJ8G" target="_blank">Discord</a>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <div class="hero">
        <div class="beach-emoji">🏖️🌸🏄‍♀️</div>
        <h1>PARTY BOX</h1>
        <p>the pinkest place on the whole internet ✨💖✨</p>
        <div class="beach-emoji">🌊🐚🍹</div>
    </div>

    <div class="party-modal-overlay active" id="partyModal">
        <div class="party-modal-content">
            <h2>🌸 HEY BESTIE! 🌸</h2>
            <p>wanna party at the beach?</p>
            <button class="party-btn" id="partyBtn">YEA SURE! 💖</button>
        </div>
    </div>

    <div class="floating-gifs" id="floatingGifs"></div>

    <div class="footer">
        <p>🌸 made with love and glitter 🌸</p>
    </div>

    <script>
        const loadingScreen = document.getElementById('loadingScreen');
        const partyModal = document.getElementById('partyModal');
        const partyBtn = document.getElementById('partyBtn');
        const floatingGifs = document.getElementById('floatingGifs');
        const blackScreen = document.getElementById('blackScreen');
        let audio = null;

        window.addEventListener('load', () => {
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
            }, 2000);
        });

        function createGif() {
            const gif = document.createElement('img');
            gif.src = 'https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExMG8yNnAyZzVsaDFzenJ6dmgxdTh2YzkzaHJqbWZ4ajBpemU3dGtxaCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/zkClqyWQzUZI22S5mI/giphy.gif';
            gif.className = 'gif-item';
            gif.style.top = Math.random() * 90 + '%';
            gif.style.left = Math.random() * 90 + '%';
            gif.style.animationDuration = (Math.random() * 10 + 10) + 's';
            gif.loading = 'lazy';
            return gif;
        }

        partyBtn.addEventListener('click', () => {
            partyModal.classList.remove('active');
            
            blackScreen.classList.add('active');
            
            setTimeout(() => {
                blackScreen.classList.remove('active');
                floatingGifs.classList.add('active');
                
                for (let i = 0; i < 25; i++) {
                    setTimeout(() => {
                        floatingGifs.appendChild(createGif());
                    }, i * 50);
                }
                
                if (!audio) {
                    audio = new Audio('patb.mp3');
                    audio.loop = true;
                    audio.volume = 0.7;
                    
                    const playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            const playAudio = () => {
                                audio.play();
                                document.body.removeEventListener('click', playAudio);
                                document.body.removeEventListener('touchstart', playAudio);
                            };
                            document.body.addEventListener('click', playAudio, { once: true });
                            document.body.addEventListener('touchstart', playAudio, { once: true });
                        });
                    }
                }
            }, 1000);
        });

        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                alert('🌸 PARTY BOX - Mobile Menu coming soon! 🌸');
            });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {});
            });
        }
    </script>
</body>
</html>
